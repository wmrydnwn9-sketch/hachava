<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ניהול | החווה</title><link rel="stylesheet" href="/assets/styles.css"></head><body><div class="site-shell"><div class="vines-left"></div><div class="vines-right"></div><div class="lamps"></div><header class="site-header"><div class="container navbar"><a class="brand" href="/"><img data-logo src="/assets/logo.png" alt="לוגו החווה"><div><div class="brand-title">אזור ניהול</div><div class="brand-subtitle" data-business-name>החווה</div></div></a><div style="display:flex;gap:12px;align-items:center"><a class="cta secondary" href="/">חזרה לאתר</a><button id="logoutBtn" type="button" class="cta secondary">התנתקות</button></div></div></header><main class="page"><div class="container admin-shell"><aside class="card admin-sidebar"><a href="/admin" data-nav>סקירה כללית</a><a href="/admin/orders" data-nav>הזמנות</a><a href="/admin/products" data-nav>מוצרים</a><a href="/admin/promotions" data-nav>מבצעים</a><a href="/admin/content" data-nav>תוכן</a><a href="/admin/media" data-nav>מדיה</a></aside><section><div class="toolbar"><div><h1 style="margin:0;color:var(--gold-soft)">ניהול מוצרים</h1><p class="muted">ניהול קטגוריות ומוצרים באתר.</p></div></div><div id="productsMessage" class="notice hidden"></div><div class="grid cols-2"><form id="categoryForm" class="card" style="padding:24px"><h3 style="margin-top:0">יצירת קטגוריה</h3><div class="field"><label>slug</label><input name="slug" required></div><div class="field"><label>שם בעברית</label><input name="name_he" required></div><div class="field"><label>תמונה (URL)</label><input name="image_url"></div><div class="field"><label>סדר</label><input name="sort_order" type="number" value="0"></div><button class="cta" type="submit">שמירת קטגוריה</button></form><form id="productForm" class="card" style="padding:24px"><h3 style="margin-top:0">יצירת מוצר</h3><div class="field"><label>קטגוריה</label><select name="category_id" id="productCategorySelect" required></select></div><div class="field"><label>שם מוצר</label><input name="name_he" required></div><div class="field"><label>תיאור</label><textarea name="description_he"></textarea></div><div class="field"><label>תמונה (URL)</label><input name="image_url"></div><div class="field"><label>סדר</label><input name="sort_order" type="number" value="0"></div><button class="cta" type="submit">שמירת מוצר</button></form></div><div id="productList" class="grid" style="margin-top:20px"></div></section></div></main><footer><div class="container footer-inner"><div>מערכת ניהול — <span data-business-name>החווה</span></div></div></footer></div><script src="/assets/app.js"></script><script>(async function(){const {API,H}=window.Hachava; if(!await H.requireAdminSession())return; await H.loadSiteShell(); H.bindAdminLayout(); const msg=document.getElementById('productsMessage'); const select=document.getElementById('productCategorySelect'); const list=document.getElementById('productList'); async function load(){const data=await API.get('/api/admin/products'); select.innerHTML=''; list.innerHTML=''; data.categories.forEach(cat=>{const opt=document.createElement('option'); opt.value=cat.id; opt.textContent=cat.name_he; select.appendChild(opt); const card=document.createElement('article'); card.className='card'; card.style.padding='20px'; card.innerHTML=`<h3 style="margin-top:0;color:var(--gold-soft)">${cat.name_he}</h3><div class="list">${(cat.products||[]).map(p=>`<li><strong>${p.name_he}</strong><div class="small muted">${p.description_he||''}</div></li>`).join('') || '<li>אין מוצרים בקטגוריה זו עדיין.</li>'}</div>`; list.appendChild(card);});}
 await load();
 document.getElementById('categoryForm').addEventListener('submit', async (e)=>{e.preventDefault(); const fd=new FormData(e.target); try{await API.post('/api/admin/categories',Object.fromEntries(fd.entries())); H.showMessage(msg,'הקטגוריה נוצרה.'); e.target.reset(); await load();}catch(err){H.showMessage(msg,err.message,true);}});
 document.getElementById('productForm').addEventListener('submit', async (e)=>{e.preventDefault(); const fd=new FormData(e.target); try{await API.post('/api/admin/products',Object.fromEntries(fd.entries())); H.showMessage(msg,'המוצר נוצר.'); e.target.reset(); await load();}catch(err){H.showMessage(msg,err.message,true);}});
})();</script></body></html>
