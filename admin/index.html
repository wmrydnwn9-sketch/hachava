<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ניהול | החווה</title><link rel="stylesheet" href="/assets/styles.css"></head><body><div class="site-shell"><div class="vines-left"></div><div class="vines-right"></div><div class="lamps"></div><header class="site-header"><div class="container navbar"><a class="brand" href="/"><img data-logo src="/assets/logo.png" alt="לוגו החווה"><div><div class="brand-title">אזור ניהול</div><div class="brand-subtitle" data-business-name>החווה</div></div></a><div style="display:flex;gap:12px;align-items:center"><a class="cta secondary" href="/">חזרה לאתר</a><button id="logoutBtn" type="button" class="cta secondary">התנתקות</button></div></div></header><main class="page"><div class="container admin-shell"><aside class="card admin-sidebar"><a href="/admin" data-nav>סקירה כללית</a><a href="/admin/orders" data-nav>הזמנות</a><a href="/admin/products" data-nav>מוצרים</a><a href="/admin/promotions" data-nav>מבצעים</a><a href="/admin/content" data-nav>תוכן</a><a href="/admin/media" data-nav>מדיה</a></aside><section><div class="toolbar"><div><h1 style="margin:0;color:var(--gold-soft)">דשבורד ניהול</h1><p class="muted">ניהול הזמנות, מוצרים, תוכן, מבצעים ומדיה.</p></div></div><section class="grid cols-3" id="dashboardCards"></section></section></div></main><footer><div class="container footer-inner"><div>מערכת ניהול — <span data-business-name>החווה</span></div></div></footer></div><script src="/assets/app.js"></script><script>(async function(){const {API,H}=window.Hachava; if(!await H.requireAdminSession())return; await H.loadSiteShell(); H.bindAdminLayout(); const data=await API.get('/api/admin/dashboard'); const cards=[['הזמנות פתוחות',data.pendingOrders],['מוצרים פעילים',data.activeProducts],['מבצעים פעילים',data.activePromotions]]; const wrap=document.getElementById('dashboardCards'); cards.forEach(([t,v])=>{const el=document.createElement('article'); el.className='card admin-card'; el.innerHTML=`<div class="content"><h3>${t}</h3><div style="font-size:2.4rem;color:var(--gold-soft);font-weight:800">${v}</div></div>`; wrap.appendChild(el);});})();</script></body></html>
