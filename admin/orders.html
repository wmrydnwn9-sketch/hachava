<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ניהול | החווה</title><link rel="stylesheet" href="/assets/styles.css"></head><body><div class="site-shell"><div class="vines-left"></div><div class="vines-right"></div><div class="lamps"></div><header class="site-header"><div class="container navbar"><a class="brand" href="/"><img data-logo src="/assets/logo.png" alt="לוגו החווה"><div><div class="brand-title">אזור ניהול</div><div class="brand-subtitle" data-business-name>החווה</div></div></a><div style="display:flex;gap:12px;align-items:center"><a class="cta secondary" href="/">חזרה לאתר</a><button id="logoutBtn" type="button" class="cta secondary">התנתקות</button></div></div></header><main class="page"><div class="container admin-shell"><aside class="card admin-sidebar"><a href="/admin" data-nav>סקירה כללית</a><a href="/admin/orders" data-nav>הזמנות</a><a href="/admin/products" data-nav>מוצרים</a><a href="/admin/promotions" data-nav>מבצעים</a><a href="/admin/content" data-nav>תוכן</a><a href="/admin/media" data-nav>מדיה</a></aside><section><div class="toolbar"><div><h1 style="margin:0;color:var(--gold-soft)">ניהול הזמנות</h1><p class="muted">צפייה בהזמנות, עדכון סטטוס ומעקב אחרי פרטי הלקוח.</p></div></div><div id="ordersMessage" class="notice hidden"></div><div class="card table-wrap"><table><thead><tr><th>תאריך</th><th>לקוח</th><th>טלפון</th><th>פרטי הזמנה</th><th>סטטוס</th><th>עדכון</th></tr></thead><tbody id="ordersBody"></tbody></table></div></section></div></main><footer><div class="container footer-inner"><div>מערכת ניהול — <span data-business-name>החווה</span></div></div></footer></div><script src="/assets/app.js"></script><script>(async function(){const {API,H}=window.Hachava; if(!await H.requireAdminSession())return; await H.loadSiteShell(); H.bindAdminLayout(); const data=await API.get('/api/admin/orders'); const body=document.getElementById('ordersBody'); const msg=document.getElementById('ordersMessage'); data.orders.forEach(order=>{const tr=document.createElement('tr'); const items=(order.items||[]).map(i=>`• ${i.product_name_snapshot} — ${i.quantity}`).join('<br>'); tr.innerHTML=`<td>${new Date(order.created_at).toLocaleString('he-IL')}</td><td>${order.customer_name}<div class="small muted">${order.order_type==='delivery'?'משלוח':'איסוף עצמי'}${order.address?'<br>'+order.address:''}${order.notes?'<br>הערות: '+order.notes:''}</div></td><td>${order.phone}</td><td>${items}</td><td><span class="status-pill">${order.status}</span></td><td><select data-id="${order.id}"><option value="pending">pending</option><option value="approved">approved</option><option value="completed">completed</option><option value="canceled">canceled</option></select><button class="cta secondary small" data-save="${order.id}" type="button">שמירה</button></td>`; tr.querySelector('select').value=order.status; body.appendChild(tr);}); body.addEventListener('click', async (e)=>{if(!e.target.dataset.save)return; const id=e.target.dataset.save; const sel=body.querySelector(`select[data-id="${id}"]`); try{await API.patch(`/api/admin/orders?id=${encodeURIComponent(id)}`,{status:sel.value}); H.showMessage(msg,'סטטוס ההזמנה עודכן.');}catch(err){H.showMessage(msg,err.message,true);}});})();</script></body></html>
