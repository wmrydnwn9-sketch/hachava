<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ניהול | החווה</title><link rel="stylesheet" href="/assets/styles.css"></head><body><div class="site-shell"><div class="vines-left"></div><div class="vines-right"></div><div class="lamps"></div><header class="site-header"><div class="container navbar"><a class="brand" href="/"><img data-logo src="/assets/logo.png" alt="לוגו החווה"><div><div class="brand-title">אזור ניהול</div><div class="brand-subtitle" data-business-name>החווה</div></div></a><div style="display:flex;gap:12px;align-items:center"><a class="cta secondary" href="/">חזרה לאתר</a><button id="logoutBtn" type="button" class="cta secondary">התנתקות</button></div></div></header><main class="page"><div class="container admin-shell"><aside class="card admin-sidebar"><a href="/admin" data-nav>סקירה כללית</a><a href="/admin/orders" data-nav>הזמנות</a><a href="/admin/products" data-nav>מוצרים</a><a href="/admin/promotions" data-nav>מבצעים</a><a href="/admin/content" data-nav>תוכן</a><a href="/admin/media" data-nav>מדיה</a></aside><section><div class="toolbar"><div><h1 style="margin:0;color:var(--gold-soft)">ניהול תוכן</h1><p class="muted">עריכת טקסטים, פרטי קשר ותוכן דפי האתר.</p></div></div><div id="contentMessage" class="notice hidden"></div><form id="contentForm" class="card" style="padding:24px"><div class="grid cols-2"><div class="field"><label>שם העסק</label><input name="business_name"></div><div class="field"><label>סלוגן</label><input name="slogan"></div><div class="field"><label>טלפון</label><input name="phone"></div><div class="field"><label>וואטסאפ</label><input name="whatsapp_url"></div><div class="field"><label>אימייל</label><input name="email"></div><div class="field"><label>אינסטגרם</label><input name="instagram_url"></div><div class="field"><label>כתובת</label><input name="address"></div><div class="field"><label>מפת הטמעה</label><input name="map_embed_url"></div><div class="field"><label>לוגו (URL)</label><input name="logo_url"></div><div class="field"><label>כיתוב כשרות</label><input name="kosher_label"></div><div class="field" style="grid-column:1/-1"><label>כותרת ראשית</label><input name="hero_title"></div><div class="field" style="grid-column:1/-1"><label>טקסט פתיחה</label><textarea name="hero_subtitle"></textarea></div><div class="field" style="grid-column:1/-1"><label>כותרת אודות</label><input name="about_title"></div><div class="field" style="grid-column:1/-1"><label>טקסט אודות</label><textarea name="about_body"></textarea></div></div><button class="cta" type="submit">שמירת שינויים</button></form></section></div></main><footer><div class="container footer-inner"><div>מערכת ניהול — <span data-business-name>החווה</span></div></div></footer></div><script src="/assets/app.js"></script><script>(async function(){const {API,H}=window.Hachava; if(!await H.requireAdminSession())return; await H.loadSiteShell(); H.bindAdminLayout(); const form=document.getElementById('contentForm'); const msg=document.getElementById('contentMessage'); const data=await API.get('/api/admin/content'); Object.entries(data.settings).forEach(([k,v])=>{if(form.elements[k]) form.elements[k].value=v||'';}); form.addEventListener('submit', async (e)=>{e.preventDefault(); const fd=new FormData(form); const payload=Object.fromEntries(fd.entries()); try{await API.patch('/api/admin/content',payload); H.showMessage(msg,'התוכן נשמר בהצלחה.');}catch(err){H.showMessage(msg,err.message,true);}});})();</script></body></html>
