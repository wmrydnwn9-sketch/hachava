<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>כניסת מנהל | החווה</title><link rel="stylesheet" href="/assets/styles.css"></head><body><div class="site-shell"><div class="vines-left"></div><div class="vines-right"></div><div class="lamps"></div><main class="page"><div class="container" style="max-width:560px"><section class="card" style="padding:30px"><div class="text-center"><img src="/assets/logo.png" alt="לוגו" style="width:120px;margin:0 auto 10px"><h1 style="margin-bottom:8px">כניסת מנהל</h1><p class="muted">התחברות למערכת הניהול של החווה</p></div><div id="loginMessage" class="notice hidden"></div><form id="loginForm"><div class="field"><label>אימייל מנהל</label><input name="email" type="email" required></div><div class="field"><label>סיסמה</label><input name="password" type="password" required></div><button class="cta" style="width:100%" type="submit">כניסה</button></form></section></div></main></div><script src="/assets/app.js"></script><script>(async function(){const {API,H}=window.Hachava; H.setActiveNav(); document.getElementById('loginForm').addEventListener('submit', async (e)=>{e.preventDefault(); const fd=new FormData(e.target); try{await API.post('/api/admin/login',{email:fd.get('email'),password:fd.get('password')}); location.href='/admin';}catch(err){H.showMessage(document.getElementById('loginMessage'),err.message||'התחברות נכשלה',true);}});})();</script></body></html>
