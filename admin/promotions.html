<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ניהול | החווה</title><link rel="stylesheet" href="/assets/styles.css"></head><body><div class="site-shell"><div class="vines-left"></div><div class="vines-right"></div><div class="lamps"></div><header class="site-header"><div class="container navbar"><a class="brand" href="/"><img data-logo src="/assets/logo.png" alt="לוגו החווה"><div><div class="brand-title">אזור ניהול</div><div class="brand-subtitle" data-business-name>החווה</div></div></a><div style="display:flex;gap:12px;align-items:center"><a class="cta secondary" href="/">חזרה לאתר</a><button id="logoutBtn" type="button" class="cta secondary">התנתקות</button></div></div></header><main class="page"><div class="container admin-shell"><aside class="card admin-sidebar"><a href="/admin" data-nav>סקירה כללית</a><a href="/admin/orders" data-nav>הזמנות</a><a href="/admin/products" data-nav>מוצרים</a><a href="/admin/promotions" data-nav>מבצעים</a><a href="/admin/content" data-nav>תוכן</a><a href="/admin/media" data-nav>מדיה</a></aside><section><div class="toolbar"><div><h1 style="margin:0;color:var(--gold-soft)">ניהול מבצעים</h1><p class="muted">יצירה, עריכה, מחיקה והפעלה של מבצעים.</p></div></div><div id="promoMessage" class="notice hidden"></div><form id="promoForm" class="card" style="padding:24px;margin-bottom:20px"><div class="grid cols-2"><div class="field"><label>כותרת</label><input name="title_he" required></div><div class="field"><label>תמונה (URL)</label><input name="image_url"></div><div class="field" style="grid-column:1/-1"><label>תיאור</label><textarea name="description_he" required></textarea></div><div class="field"><label>מתאריך</label><input type="datetime-local" name="starts_at"></div><div class="field"><label>עד תאריך</label><input type="datetime-local" name="ends_at"></div></div><label class="option" style="max-width:220px"><input type="checkbox" name="is_active" checked> מבצע פעיל</label><button class="cta" type="submit">יצירת מבצע</button></form><div id="promoList" class="grid"></div></section></div></main><footer><div class="container footer-inner"><div>מערכת ניהול — <span data-business-name>החווה</span></div></div></footer></div><script src="/assets/app.js"></script><script>(async function(){const {API,H}=window.Hachava; if(!await H.requireAdminSession())return; await H.loadSiteShell(); H.bindAdminLayout(); const list=document.getElementById('promoList'); const msg=document.getElementById('promoMessage'); async function load(){list.innerHTML=''; const data=await API.get('/api/admin/promotions'); data.promotions.forEach(p=>{const card=document.createElement('article'); card.className='card'; card.style.padding='20px'; card.innerHTML=`<h3 style="margin-top:0;color:var(--gold-soft)">${p.title_he}</h3><p class="muted">${p.description_he}</p><div class="small muted">סטטוס: ${p.is_active?'פעיל':'לא פעיל'}</div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px"><button class="cta secondary" type="button" data-toggle="${p.id}" data-active="${p.is_active}">${p.is_active?'כיבוי':'הפעלה'}</button><button class="cta secondary" type="button" data-delete="${p.id}">מחיקה</button></div>`; list.appendChild(card);});}
 await load();
 document.getElementById('promoForm').addEventListener('submit', async (e)=>{e.preventDefault(); const fd=new FormData(e.target); const payload=Object.fromEntries(fd.entries()); payload.is_active=fd.get('is_active')==='on'; try{await API.post('/api/admin/promotions',payload); e.target.reset(); H.showMessage(msg,'המבצע נוצר בהצלחה.'); await load();}catch(err){H.showMessage(msg,err.message,true);}});
 list.addEventListener('click', async (e)=>{if(e.target.dataset.toggle){const id=e.target.dataset.toggle; const active=e.target.dataset.active==='true'; try{await API.patch(`/api/admin/promotions?id=${encodeURIComponent(id)}`,{is_active:!active}); await load(); H.showMessage(msg,'המבצע עודכן.');}catch(err){H.showMessage(msg,err.message,true);}} if(e.target.dataset.delete){try{await API.del(`/api/admin/promotions?id=${encodeURIComponent(e.target.dataset.delete)}`); await load(); H.showMessage(msg,'המבצע נמחק.');}catch(err){H.showMessage(msg,err.message,true);}}});})();</script></body></html>
