<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ניהול | החווה</title><link rel="stylesheet" href="/assets/styles.css"></head><body><div class="site-shell"><div class="vines-left"></div><div class="vines-right"></div><div class="lamps"></div><header class="site-header"><div class="container navbar"><a class="brand" href="/"><img data-logo src="/assets/logo.png" alt="לוגו החווה"><div><div class="brand-title">אזור ניהול</div><div class="brand-subtitle" data-business-name>החווה</div></div></a><div style="display:flex;gap:12px;align-items:center"><a class="cta secondary" href="/">חזרה לאתר</a><button id="logoutBtn" type="button" class="cta secondary">התנתקות</button></div></div></header><main class="page"><div class="container admin-shell"><aside class="card admin-sidebar"><a href="/admin" data-nav>סקירה כללית</a><a href="/admin/orders" data-nav>הזמנות</a><a href="/admin/products" data-nav>מוצרים</a><a href="/admin/promotions" data-nav>מבצעים</a><a href="/admin/content" data-nav>תוכן</a><a href="/admin/media" data-nav>מדיה</a></aside><section><div class="toolbar"><div><h1 style="margin:0;color:var(--gold-soft)">ניהול מדיה</h1><p class="muted">העלאת תמונות ללוגו, למוצרים ולמבצעים.</p></div></div><div id="mediaMessage" class="notice hidden"></div><form id="uploadForm" class="card" style="padding:24px"><div class="grid cols-2"><div class="field"><label>תיקייה</label><select name="folder"><option value="general">כללי</option><option value="logos">לוגו</option><option value="products">מוצרים</option><option value="promotions">מבצעים</option><option value="backgrounds">רקעים</option></select></div><div class="field"><label>בחירת קובץ</label><input type="file" name="file" accept="image/*" required></div></div><button class="cta" type="submit">העלאת תמונה</button><div id="uploadPreview" class="upload-preview hidden" style="margin-top:16px"></div></form></section></div></main><footer><div class="container footer-inner"><div>מערכת ניהול — <span data-business-name>החווה</span></div></div></footer></div><script src="/assets/app.js"></script><script>(async function(){const {API,H}=window.Hachava; if(!await H.requireAdminSession())return; await H.loadSiteShell(); H.bindAdminLayout(); const form=document.getElementById('uploadForm'); const msg=document.getElementById('mediaMessage'); const preview=document.getElementById('uploadPreview'); form.addEventListener('submit', async (e)=>{e.preventDefault(); const fd=new FormData(form); try{const data=await API.post('/api/admin/upload',fd,true); preview.classList.remove('hidden'); preview.innerHTML=`<div class="notice">התמונה הועלתה בהצלחה.</div><a href="${data.url}" target="_blank">${data.url}</a><img src="${data.url}" alt="preview" style="max-width:280px;border-radius:18px">`; H.showMessage(msg,'העלאת התמונה הושלמה.');}catch(err){H.showMessage(msg,err.message,true);}});})();</script></body></html>
