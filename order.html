<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>החווה</title><link rel="stylesheet" href="/assets/styles.css"></head><body><div class="site-shell"><div class="vines-left"></div><div class="vines-right"></div><div class="lamps"></div><header class="site-header"><div class="container navbar"><a class="brand" href="/"><img data-logo src="/assets/logo.png" alt="לוגו החווה"><div><div class="brand-title" data-business-name>החווה</div><div class="brand-subtitle" data-slogan>מהמשק לצלחת</div></div></a><nav class="nav-links"><a data-nav href="/">דף הבית</a><a data-nav href="/products">מוצרים</a><a data-nav href="/order">הזמנה</a><a data-nav href="/about">אודות</a><a data-nav href="/contact">צור קשר</a><a data-nav data-promotions-link href="/promotions">מבצעים</a></nav><a href="/order" class="cta">הזמינו עכשיו</a></div></header><main class="page"><div class="container"><div class="section-title"><h1>ביצוע הזמנה</h1><p>בחרו מוצרים, הגדירו כמויות, מלאו פרטים ואנחנו נדאג לשאר.</p></div><div id="formMessage" class="notice hidden"></div><div class="order-layout"><section id="orderProducts" class="grid"></section><section class="card" style="padding:22px"><form id="orderForm"><div class="field"><label>שם מלא</label><input name="customer_name" required></div><div class="field"><label>מספר טלפון</label><input name="phone" required></div><div class="field"><label>כתובת מלאה</label><input name="address"></div><div class="field"><label>הערות</label><textarea name="notes"></textarea></div><div class="inline-options"><label class="option"><input type="radio" name="order_type" value="delivery" checked> משלוח</label><label class="option"><input type="radio" name="order_type" value="pickup"> איסוף עצמי</label></div><button class="cta" style="width:100%" type="submit">שליחת הזמנה</button></form></section></div></div></main><footer><div class="container footer-inner"><div>© <span data-business-name>החווה</span> — מהמשק לצלחת</div><div class="small">כשר • פרימיום • חוויית בוטיק כפרית</div></div></footer></div><script src="/assets/app.js"></script><script>
(async function(){const {API,H}=window.Hachava; await H.loadSiteShell(); const data=await API.get('/api/products-public'); const target=document.getElementById('orderProducts'); H.populateProducts(target,data.categories,true); document.getElementById('orderForm').addEventListener('submit', async (e)=>{e.preventDefault(); const form=new FormData(e.target); const items=[...target.querySelectorAll('input[data-product-id]')].map(i=>({product_id:i.dataset.productId, quantity:Number(i.value||0), product_name:i.dataset.productName})).filter(x=>x.quantity>0); const payload={customer_name:form.get('customer_name'), phone:form.get('phone'), address:form.get('address'), notes:form.get('notes'), order_type:form.get('order_type'), items}; const msg=document.getElementById('formMessage'); if(!items.length){return H.showMessage(msg,'יש לבחור לפחות מוצר אחד.',true);} try{await API.post('/api/orders',payload); e.target.reset(); [...target.querySelectorAll('input[data-product-id]')].forEach(i=>i.value='0'); H.showMessage(msg,'ההזמנה נשלחה בהצלחה. נחזור אליכם בהקדם.');}catch(err){H.showMessage(msg,err.message||'אירעה שגיאה בשליחת ההזמנה.',true);}});})();
</script></body></html>
