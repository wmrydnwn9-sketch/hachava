<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>החווה</title><link rel="stylesheet" href="/assets/styles.css"></head><body><div class="site-shell"><div class="vines-left"></div><div class="vines-right"></div><div class="lamps"></div><header class="site-header"><div class="container navbar"><a class="brand" href="/"><img data-logo src="/assets/logo.png" alt="לוגו החווה"><div><div class="brand-title" data-business-name>החווה</div><div class="brand-subtitle" data-slogan>מהמשק לצלחת</div></div></a><nav class="nav-links"><a data-nav href="/">דף הבית</a><a data-nav href="/products">מוצרים</a><a data-nav href="/order">הזמנה</a><a data-nav href="/about">אודות</a><a data-nav href="/contact">צור קשר</a><a data-nav data-promotions-link href="/promotions">מבצעים</a></nav><a href="/order" class="cta">הזמינו עכשיו</a></div></header><main class="page"><div class="container"><div class="section-title"><h1>מבצעים מיוחדים</h1><p>הצעות נבחרות המתעדכנות ממערכת הניהול.</p></div><section id="promoGrid" class="grid cols-2"></section><div id="promoEmpty" class="card hidden" style="padding:28px;text-align:center"><h3 style="margin-top:0;color:var(--gold-soft)">אין כרגע מבצעים פעילים</h3><p class="muted">נשמח לראות אתכם שוב בקרוב.</p></div></div></main><footer><div class="container footer-inner"><div>© <span data-business-name>החווה</span> — מהמשק לצלחת</div><div class="small">כשר • פרימיום • חוויית בוטיק כפרית</div></div></footer></div><script src="/assets/app.js"></script><script>(async function(){const {API,H}=window.Hachava; await H.loadSiteShell(); const data=await API.get('/api/promotions-public'); const grid=document.getElementById('promoGrid'); if(!data.promotions.length){document.getElementById('promoEmpty').classList.remove('hidden'); return;} data.promotions.forEach(p=>{const art=document.createElement('article'); art.className='card promo-card'; art.innerHTML=`${p.image_url?`<div class="image-box"><img src="${p.image_url}" alt="${p.title_he}"></div>`:''}<div class="content"><h3>${p.title_he}</h3><p class="muted">${p.description_he}</p></div>`; grid.appendChild(art);});})();</script></body></html>
